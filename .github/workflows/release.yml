name: Release Build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          SOURCE_REVISION=$(git rev-parse HEAD)
          RELEASED_AT="${{ github.event.release.published_at }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          CHANNEL=$([[ "$IS_PRERELEASE" == "true" ]] && echo "Dev" || echo "Stable")

          dotnet build ShokoIntegrityChecker.sln --configuration Release \
            -p:ReleaseTag="$TAG" \
            -p:SourceRevision="$SOURCE_REVISION" \
            -p:ReleaseDate="$RELEASED_AT" \
            -p:ReleaseChannel="$CHANNEL"

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SOURCE_REVISION=$SOURCE_REVISION" >> "$GITHUB_ENV"
          echo "RELEASED_AT=$RELEASED_AT" >> "$GITHUB_ENV"
          echo "CHANNEL=$CHANNEL" >> "$GITHUB_ENV"

      - name: Package
        run: |
          ZIP_NAME="ShokoIntegrityChecker-${{ github.event.release.tag_name }}-any.zip"
          cd ShokoIntegrityChecker/bin/Release/net10.0
          zip -r "../../../../${ZIP_NAME}" ShokoIntegrityChecker.dll dashboard
          cd ../../../..
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${ZIP_NAME}" \
            --repo "${{ github.repository }}"

      - name: Update Manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_NOTES=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body)
          CHECKSUM=$(sha256sum "${ZIP_NAME}" | awk '{ print $1 }')
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_NAME}"

          RELEASE_ENTRY=$(jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg source_revision "$SOURCE_REVISION" \
            --arg released_at "$RELEASED_AT" \
            --arg channel "$CHANNEL" \
            --arg release_notes "$RELEASE_NOTES" \
            --arg url "$URL" \
            --arg checksum "$CHECKSUM" \
            '{
              version: $version,
              tag: $tag,
              source_revision: $source_revision,
              released_at: $released_at,
              channel: $channel,
              release_notes: $release_notes,
              archives: [
                {
                  runtime: "any",
                  abstraction: "6.0.0",
                  url: $url,
                  checksum: $checksum
                }
              ]
            }')

          jq --argjson release "$RELEASE_ENTRY" '
            .releases |= [ $release ] + (. | map(select(.version != $release.version)))
          ' manifest.json > manifest.json.tmp && mv manifest.json.tmp manifest.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "ci: update manifest for ${TAG}"
          git push origin HEAD:main
